kind = "web"
previewPath = "/"
title = "RitualFeed"
version = "1.0.0"
id = "artifacts/ritualfeed"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20331

[services.development]
run = "pnpm --filter @workspace/ritualfeed run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/ritualfeed", "run", "build" ]
publicDir = "artifacts/ritualfeed/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20331"
BASE_PATH = "/"
